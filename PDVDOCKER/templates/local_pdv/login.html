{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Operador • Caixa Local</title>
    <!-- Tailwind CSS (Offline fallback) -->
    <link rel="stylesheet" href="{% static 'css/tailwind.min.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        accentBlue: '#3b82f6',
                        accentGreen: '#10b981',
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #070a13;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-blue:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div class="inline-flex bg-blue-600 p-3.5 rounded-2xl text-white shadow-xl shadow-blue-500/10 mb-3">
                <i data-lucide="monitor" class="w-8 h-8 animate-pulse"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Acesso ao Frente de Caixa</h1>
            <p class="text-xs text-gray-400 mt-1">Terminal de Vendas Local (Offline-First)</p>
        </div>

        <!-- Glassmorphism Card -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            
            {% if erro %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-start gap-2.5 text-xs text-red-400">
                <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0 mt-0.5 animate-bounce"></i>
                <p>{{ erro }}</p>
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="username" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Usuário (Operador)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-500">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" name="username" id="username" required placeholder="Digite o usuário..." class="w-full pl-10 pr-4 py-3 bg-gray-950/80 border border-gray-800 rounded-xl glow-blue outline-none text-sm text-white placeholder-gray-600 transition-all font-semibold">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-500">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" name="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-gray-950/80 border border-gray-800 rounded-xl glow-blue outline-none text-sm text-white placeholder-gray-600 transition-all font-semibold">
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> ENTRAR NO TERMINAL
                </button>
            </form>
        </div>

        <!-- Offline Status Footer -->
        <div class="text-center mt-6 flex justify-center items-center gap-1.5 text-[10px] text-gray-500">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500/20 border border-emerald-500/40 flex items-center justify-center">
                <span class="w-1 h-1 rounded-full bg-emerald-400"></span>
            </span>
            <span>Autenticação Local Ativa</span>
            <span class="text-gray-700">•</span>
            <span>SQLite v3</span>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
