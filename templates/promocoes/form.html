{% extends 'base.html' %}

{% block header_actions %}
<a href="{% url 'promocoes:lista' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors">Cancelar</a>
{% endblock %}

{% block content %}
<form method="POST" class="max-w-3xl mx-auto">
    {% csrf_token %}
    
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm dark:bg-gray-800 dark:border-gray-700 mb-6">
        <div class="p-6 border-b border-gray-100 dark:border-gray-700 bg-blue-600 rounded-t-xl text-white">
            <h2 class="text-lg font-bold flex items-center gap-2">
                <i data-lucide="tag" class="w-5 h-5"></i>
                Programar Nova Promoção
            </h2>
            <p class="text-sm text-blue-100 mt-1">O preço no PDV será alterado automaticamente durante o período de vigência.</p>
        </div>
        
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Selecione o Produto *</label>
                <select name="produto_id" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
                    <option value="">Buscar produto...</option>
                    {% for p in produtos %}
                    <option value="{{ p.id }}">{{ p.nome }} - Preço Normal: R$ {{ p.valor_venda }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipo de Desconto</label>
                <select name="tipo" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
                    <option value="percentual">Porcentagem (%)</option>
                    <option value="valor_fixo">Valor Fixo (R$ a deduzir)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Valor do Desconto *</label>
                <input type="number" step="0.01" name="valor" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white font-bold text-red-600 text-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Data e Hora de Início *</label>
                <input type="datetime-local" name="data_inicio" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Data e Hora de Término *</label>
                <input type="datetime-local" name="data_fim" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Descrição / Motivo (Ex: Black Friday)</label>
                <input type="text" name="descricao" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
        </div>
    </div>

    <div class="flex justify-end">
        <button type="submit" class="px-6 py-3 text-sm font-bold text-white bg-green-600 rounded-lg hover:bg-green-700 flex items-center gap-2 transition-colors shadow-lg shadow-green-600/30">
            <i data-lucide="check-circle" class="w-5 h-5"></i> Ativar Promoção
        </button>
    </div>
</form>
{% endblock %}
