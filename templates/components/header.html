<header class="sticky top-0 z-30 flex items-center justify-between w-full h-16 px-6 bg-white border-b dark:bg-gray-900 dark:border-gray-700">
    <div class="flex items-center">
        <button @click="sidebarOpen = !sidebarOpen" class="text-gray-500 focus:outline-none lg:hidden">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="flex items-center gap-4">
        <!-- Dark Mode Toggle -->
        <button onclick="toggleDarkMode()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none">
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
            <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
        </button>

        <!-- User Dropdown (Alpine.js) -->
        <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" class="flex items-center gap-2 focus:outline-none">
                <div class="w-8 h-8 overflow-hidden border-2 border-gray-400 rounded-full">
                    {% if user.avatar %}
                        <img src="{{ user.avatar.url }}" class="object-cover w-full h-full" alt="avatar">
                    {% else %}
                        <div class="w-full h-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">
                            {{ user.first_name|first|default:user.username|first|upper }}
                        </div>
                    {% endif %}
                </div>
                <span class="hidden text-sm font-medium text-gray-700 dark:text-gray-200 md:block">{{ user.get_full_name|default:user.username }}</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
            </button>

            <!-- Dropdown menu -->
            <div x-show="open" @click.away="open = false" x-cloak
                class="absolute right-0 w-48 mt-2 origin-top-right bg-white rounded-md shadow-xl dark:bg-gray-800 ring-1 ring-black ring-opacity-5 focus:outline-none z-50">
                <div class="py-1">
                    <div class="px-4 py-2 border-b dark:border-gray-700">
                        <p class="text-sm font-medium text-gray-900 dark:text-white">{{ user.get_full_name|default:user.username }}</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">{{ user.get_role_display }}</p>
                    </div>
                    <a href="{% url 'usuarios:logout' %}" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">
                        Sair do Sistema
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
