{% if messages %}
<div class="mb-6 space-y-2">
    {% for message in messages %}
    <div class="p-4 rounded-lg flex items-center gap-3
        {% if message.tags == 'success' %}bg-green-50 text-green-800 dark:bg-green-900/30 dark:text-green-400
        {% elif message.tags == 'error' %}bg-red-50 text-red-800 dark:bg-red-900/30 dark:text-red-400
        {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400
        {% else %}bg-blue-50 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400{% endif %}"
    >
        {% if message.tags == 'success' %}
            <i data-lucide="check-circle" class="w-5 h-5"></i>
        {% elif message.tags == 'error' %}
            <i data-lucide="alert-circle" class="w-5 h-5"></i>
        {% elif message.tags == 'warning' %}
            <i data-lucide="alert-triangle" class="w-5 h-5"></i>
        {% else %}
            <i data-lucide="info" class="w-5 h-5"></i>
        {% endif %}
        <p class="text-sm font-medium">{{ message }}</p>
    </div>
    {% endfor %}
</div>
{% endif %}
