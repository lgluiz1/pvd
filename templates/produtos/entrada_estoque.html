{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <!-- Card Principal -->
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden dark:bg-gray-800 dark:border-gray-700">
        <div class="p-6 bg-gray-50 border-b border-gray-100 dark:bg-gray-900/50 dark:border-gray-700 flex items-center gap-3">
            <div class="p-2 bg-blue-100 text-blue-600 rounded-lg dark:bg-blue-900/50 dark:text-blue-400">
                <i data-lucide="package-plus" class="w-6 h-6"></i>
            </div>
            <div>
                <h2 class="text-lg font-bold text-gray-900 dark:text-white">Reposição Rápida de Estoque</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Bipe o produto para adicionar estoque e atualizar valores</p>
            </div>
        </div>

        <div class="p-6">
            <!-- Busca por código -->
            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Código de Barras ou Interno</label>
                <div class="relative flex items-center gap-2">
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="barcode" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="text" id="input-busca-codigo" placeholder="Bipe ou digite o código e aperte ENTER..." 
                            class="w-full pl-10 pr-4 py-3 text-lg border rounded-xl dark:bg-gray-900 dark:border-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-inner" autofocus>
                    </div>
                    <button type="button" id="btn-camera" class="p-3 bg-blue-100 text-blue-600 hover:bg-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:hover:bg-blue-800/50 rounded-xl transition-colors shrink-0" title="Ler com a Câmera">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="reader-container" class="mt-4 hidden">
                    <div id="reader" class="w-full max-w-md mx-auto overflow-hidden rounded-xl border border-gray-200 dark:border-gray-700"></div>
                    <div class="text-center mt-2">
                        <button type="button" id="btn-fechar-camera" class="text-sm text-red-500 hover:text-red-700 font-medium">Fechar Câmera</button>
                    </div>
                </div>
                <p id="msg-busca" class="mt-2 text-sm text-red-500 hidden"></p>
            </div>

            <!-- Formulário de Entrada (oculto inicialmente) -->
            <form method="POST" id="form-entrada" class="hidden space-y-6 animate-fade-in">
                {% csrf_token %}
                <input type="hidden" name="produto_id" id="produto_id">

                <div class="p-4 bg-blue-50 border border-blue-100 rounded-xl dark:bg-blue-900/20 dark:border-blue-800/30 flex items-center gap-4">
                    <div id="prod-img-container" class="w-16 h-16 bg-white border border-gray-200 rounded-lg overflow-hidden shrink-0 flex items-center justify-center dark:bg-gray-800 dark:border-gray-700">
                        <i data-lucide="image" class="w-8 h-8 text-gray-300"></i>
                    </div>
                    <div>
                        <h3 id="prod-nome" class="text-lg font-bold text-gray-900 dark:text-white">Nome do Produto</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Código: <span id="prod-codigo" class="font-mono"></span></p>
                        <p class="text-sm font-semibold mt-1 text-blue-700 dark:text-blue-400">Estoque Atual: <span id="prod-estoque">0</span></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Qtd. a Adicionar *</label>
                        <input type="number" step="0.001" name="quantidade_adicionar" id="quantidade_adicionar" required min="0.001"
                            class="w-full px-4 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="Ex: 10">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Novo Custo (R$) <span class="text-xs text-gray-400 font-normal">(opcional)</span></label>
                        <input type="text" name="novo_custo" id="novo_custo" 
                            class="w-full px-4 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 money2">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Novo Venda (R$) <span class="text-xs text-gray-400 font-normal">(opcional)</span></label>
                        <input type="text" name="novo_venda" id="novo_venda" 
                            class="w-full px-4 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 money2">
                    </div>
                </div>

                <div class="flex justify-end pt-4 border-t border-gray-100 dark:border-gray-700 gap-3">
                    <button type="button" onclick="resetForm()" class="px-6 py-2.5 text-sm font-semibold text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="px-6 py-2.5 text-sm font-bold text-white bg-emerald-600 rounded-lg hover:bg-emerald-700 shadow-md shadow-emerald-500/20 transition-all flex items-center gap-2">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                        Confirmar Entrada
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
</style>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/jquery.mask.min.js' %}"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    $(document).ready(function() {
        $('.money2').mask("#.##0,00", {reverse: true});

        const inputBusca = document.getElementById('input-busca-codigo');
        const formEntrada = document.getElementById('form-entrada');
        const msgBusca = document.getElementById('msg-busca');

        inputBusca.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const codigo = this.value.trim();
                if (!codigo) return;

                // Buscar via AJAX
                fetch(`{% url 'produtos:buscar_codigo' %}?codigo=${encodeURIComponent(codigo)}`)
                    .then(r => r.json())
                    .then(res => {
                        if (res.found) {
                            msgBusca.classList.add('hidden');
                            
                            // Preencher form
                            document.getElementById('produto_id').value = res.produto.id;
                            document.getElementById('prod-nome').textContent = res.produto.nome;
                            document.getElementById('prod-codigo').textContent = res.produto.codigo_barras;
                            document.getElementById('prod-estoque').textContent = res.produto.quantidade;
                            
                            document.getElementById('quantidade_adicionar').value = '';
                            document.getElementById('novo_custo').value = ''; // opcional
                            document.getElementById('novo_venda').value = res.produto.valor_venda.replace('.', ',');

                            // Imagem
                            const imgContainer = document.getElementById('prod-img-container');
                            if (res.produto.imagem) {
                                imgContainer.innerHTML = `<img src="${res.produto.imagem}" class="w-full h-full object-cover">`;
                            } else {
                                imgContainer.innerHTML = `<i data-lucide="image" class="w-8 h-8 text-gray-300"></i>`;
                                lucide.createIcons();
                            }

                            formEntrada.classList.remove('hidden');
                            document.getElementById('quantidade_adicionar').focus();
                        } else {
                            resetForm();
                            msgBusca.textContent = 'Produto não encontrado. Verifique o código e tente novamente.';
                            msgBusca.classList.remove('hidden');
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        msgBusca.textContent = 'Erro ao buscar produto. Tente novamente.';
                        msgBusca.classList.remove('hidden');
                    });
            }
        });
    });

    function resetForm() {
        document.getElementById('form-entrada').classList.add('hidden');
        document.getElementById('input-busca-codigo').value = '';
        document.getElementById('input-busca-codigo').focus();
        document.getElementById('msg-busca').classList.add('hidden');
    }

    // Leitor de Câmera (Barcode / QR)
    let html5QrcodeScanner = null;
    
    function onScanSuccess(decodedText, decodedResult) {
        // Quando lê um código com sucesso
        document.getElementById('input-busca-codigo').value = decodedText;
        
        // Simula o Enter para buscar
        const event = new KeyboardEvent('keydown', { key: 'Enter' });
        document.getElementById('input-busca-codigo').dispatchEvent(event);
        
        // Pausa a câmera após a leitura com sucesso para evitar leituras duplas rápidas
        if (html5QrcodeScanner) {
            html5QrcodeScanner.pause(true);
            setTimeout(() => {
                // Desliga totalmente se a busca achou o produto (o form_entrada perde o hidden)
                if (!document.getElementById('form-entrada').classList.contains('hidden')) {
                    stopScanner();
                } else {
                    html5QrcodeScanner.resume(); // Retoma se deu erro e ainda está na tela
                }
            }, 1000);
        }
    }

    function onScanFailure(error) {
        // Ignora erros normais (quando ele não está vendo um código)
    }

    function stopScanner() {
        document.getElementById('reader-container').classList.add('hidden');
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(err => {
                console.error("Failed to clear scanner", err);
            });
            html5QrcodeScanner = null;
        }
    }

    $(document).ready(function() {
        const btnCamera = document.getElementById('btn-camera');
        const btnFecharCamera = document.getElementById('btn-fechar-camera');
        
        if (btnCamera) {
            btnCamera.addEventListener('click', function() {
                document.getElementById('reader-container').classList.remove('hidden');
                
                try {
                    if (!html5QrcodeScanner) {
                        html5QrcodeScanner = new Html5QrcodeScanner(
                            "reader",
                            { fps: 10, qrbox: {width: 250, height: 150}, rememberLastUsedCamera: true },
                            /* verbose= */ false);
                        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Erro ao tentar abrir a câmera.\n\nMotivos comuns:\n1. O navegador bloqueou o acesso à câmera.\n2. Você está acessando pelo celular via HTTP (sem cadeado de segurança). O celular exige HTTPS para ligar a câmera.\n\nDetalhe técnico: " + err.message);
                }
            });
        }

        if (btnFecharCamera) {
            btnFecharCamera.addEventListener('click', stopScanner);
        }
    });
</script>
{% endblock %}
