{% extends 'base.html' %}

{% block header_actions %}
<a href="{% url 'fornecedores:lista' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors">Cancelar</a>
{% endblock %}

{% block content %}
<form method="POST" class="max-w-4xl mx-auto">
    {% csrf_token %}
    
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm dark:bg-gray-800 dark:border-gray-700 mb-6">
        <div class="p-6 border-b border-gray-100 dark:border-gray-700">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <i data-lucide="truck" class="w-5 h-5 text-blue-600"></i>
                Dados do Fornecedor
            </h2>
        </div>
        
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Razão Social ou Nome *</label>
                <input type="text" name="nome" value="{{ fornecedor.nome }}" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">CNPJ</label>
                <input type="text" name="cnpj" value="{{ fornecedor.cnpj }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Pessoa de Contato (Representante)</label>
                <input type="text" name="contato" value="{{ fornecedor.contato }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telefone Principal</label>
                <input type="text" name="telefone" value="{{ fornecedor.telefone }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail Comercial</label>
                <input type="email" name="email" value="{{ fornecedor.email }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Endereço de Faturamento / Coleta</label>
                <input type="text" name="endereco" value="{{ fornecedor.endereco }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Observações e Prazos</label>
                <textarea name="observacoes" rows="3" placeholder="Ex: Prazo de boleto 30/60 dias, entrega as terças..." class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">{{ fornecedor.observacoes }}</textarea>
            </div>
        </div>
    </div>

    {% if editando %}
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm mb-6 dark:bg-gray-800 dark:border-gray-700 p-6">
        <div class="flex items-center gap-2">
            <input type="checkbox" name="ativo" id="ativo" {% if fornecedor.ativo %}checked{% endif %} class="rounded border-gray-300 text-blue-600 w-5 h-5">
            <label for="ativo" class="text-sm font-medium text-gray-700 dark:text-gray-300">Fornecedor Ativo</label>
        </div>
    </div>
    {% endif %}

    <div class="flex justify-end">
        <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-md">
            <i data-lucide="save" class="w-4 h-4"></i> Salvar Fornecedor
        </button>
    </div>
</form>
{% endblock %}
