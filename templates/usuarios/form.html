{% extends 'base.html' %}

{% block header_actions %}
<a href="{% url 'usuarios:lista' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors">Cancelar</a>
{% endblock %}

{% block content %}
<form method="POST" class="max-w-3xl mx-auto">
    {% csrf_token %}
    
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm dark:bg-gray-800 dark:border-gray-700 mb-6">
        <div class="p-6 border-b border-gray-100 dark:border-gray-700">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <i data-lucide="shield" class="w-5 h-5 text-blue-600"></i>
                Dados de Acesso
            </h2>
        </div>
        
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome de Usuário (Login) *</label>
                <input type="text" name="username" value="{{ usuario.username }}" required {% if editando %}readonly{% endif %} class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white {% if editando %}bg-gray-100 dark:bg-gray-800{% endif %}">
                {% if editando %}<p class="text-xs text-gray-500 mt-1">O username não pode ser alterado.</p>{% endif %}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha {% if editando %}(Deixe em branco para não alterar){% else %}*{% endif %}</label>
                <input type="password" name="password" {% if not editando %}required{% endif %} class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome</label>
                <input type="text" name="first_name" value="{{ usuario.first_name }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Sobrenome</label>
                <input type="text" name="last_name" value="{{ usuario.last_name }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
                <input type="email" name="email" value="{{ usuario.email }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telefone</label>
                <input type="text" name="telefone" value="{{ usuario.telefone }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nível de Acesso no Sistema</label>
                <select name="role" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
                    <option value="operador" {% if usuario.role == 'operador' %}selected{% endif %}>Operador de Caixa (Apenas Vendas, Abertura/Fechamento de Caixa)</option>
                    <option value="gerente" {% if usuario.role == 'gerente' %}selected{% endif %}>Gerente (Acesso a Produtos, Estoque, Cancelamentos)</option>
                    <option value="admin" {% if usuario.role == 'admin' %}selected{% endif %}>Administrador (Acesso Total, Fiados, Configurações, Dashboard)</option>
                </select>
            </div>
        </div>
    </div>

    {% if editando %}
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm mb-6 dark:bg-gray-800 dark:border-gray-700 p-6">
        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_active" id="is_active" {% if usuario.is_active %}checked{% endif %} class="rounded border-gray-300 text-blue-600 w-5 h-5">
            <label for="is_active" class="text-sm font-medium text-gray-700 dark:text-gray-300">Permitir que este usuário faça login no sistema.</label>
        </div>
    </div>
    {% endif %}

    <div class="flex justify-end">
        <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-md">
            <i data-lucide="save" class="w-4 h-4"></i> Salvar Usuário
        </button>
    </div>
</form>
{% endblock %}
