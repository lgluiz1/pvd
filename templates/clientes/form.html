{% extends 'base.html' %}

{% block header_actions %}
<a href="{% url 'clientes:lista' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors">Cancelar</a>
{% endblock %}

{% block content %}
<form method="POST" class="max-w-4xl mx-auto">
    {% csrf_token %}
    
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm dark:bg-gray-800 dark:border-gray-700 mb-6">
        <div class="p-6 border-b border-gray-100 dark:border-gray-700">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <i data-lucide="user" class="w-5 h-5 text-blue-600"></i>
                Dados do Cliente
            </h2>
        </div>
        
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome Completo *</label>
                <input type="text" name="nome" value="{{ cliente.nome }}" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">CPF / CNPJ</label>
                <input type="text" name="cpf" value="{{ cliente.cpf }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telefone / WhatsApp</label>
                <input type="text" name="telefone" value="{{ cliente.telefone }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div class="md:col-span-2 bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100 dark:border-blue-900/50 rounded-xl p-4">
                <label class="block text-sm font-semibold text-blue-800 dark:text-blue-300 mb-1 flex items-center gap-1.5">
                    <i data-lucide="nfc" class="w-4 h-4"></i> ID do Cartão NFC / RFID
                </label>
                <input type="text" name="nfc_uid" value="{{ cliente.nfc_uid|default:'' }}" placeholder="Aproxime o cartão do leitor ou digite o código dele" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-blue-900 dark:text-white focus:ring-blue-500 focus:border-blue-500 bg-white">
                <p class="text-xs text-blue-600 dark:text-blue-400 mt-1">Dica: Deixe o cursor focado neste campo e passe o cartão NFC no leitor para preenchimento instantâneo.</p>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
                <input type="email" name="email" value="{{ cliente.email }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Endereço Completo</label>
                <input type="text" name="endereco" value="{{ cliente.endereco }}" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Observações Adicionais</label>
                <textarea name="observacoes" rows="3" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-900 dark:border-gray-700 dark:text-white">{{ cliente.observacoes }}</textarea>
            </div>
        </div>
    </div>

    {% if editando %}
    <div class="bg-white border border-gray-100 rounded-xl shadow-sm mb-6 dark:bg-gray-800 dark:border-gray-700 p-6">
        <div class="flex items-center gap-2">
            <input type="checkbox" name="ativo" id="ativo" {% if cliente.ativo %}checked{% endif %} class="rounded border-gray-300 text-blue-600 w-5 h-5">
            <label for="ativo" class="text-sm font-medium text-gray-700 dark:text-gray-300">Cliente Ativo no Sistema</label>
        </div>
    </div>
    {% endif %}

    <div class="flex justify-end">
        <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-md">
            <i data-lucide="save" class="w-4 h-4"></i> Salvar Cliente
        </button>
    </div>
</form>
{% endblock %}
